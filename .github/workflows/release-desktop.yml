name: Release desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build app bundle
        run: npm run build:electron

      - name: Package Windows installer
        run: npx electron-builder --win --x64 --publish never

      - name: Stage Windows release asset
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-build/*-win-setup.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No Windows installer in release-build/"
            ls -la release-build || true
            exit 1
          fi
          cp "${files[0]}" Taplo-win.exe

      - uses: actions/upload-artifact@v4
        with:
          name: Taplo-win.exe
          path: Taplo-win.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    continue-on-error: true
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build app bundle
        run: npm run build:electron

      - name: Package macOS installer
        run: npx electron-builder --mac --publish never

      - name: Stage macOS release asset
        shell: bash
        run: |
          shopt -s nullglob
          files=(release-build/*.dmg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No macOS dmg in release-build/"
            ls -la release-build || true
            exit 1
          fi
          cp "${files[0]}" Taplo-mac.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Taplo-mac.dmg
          path: Taplo-mac.dmg
          if-no-files-found: error

  release:
    needs: [build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/') && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            installers/Taplo-win.exe
            installers/Taplo-mac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
