name: Release desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmd: npm run package:mac
            artifact_glob: "release-build/*.dmg"
            release_name: Taplo-mac.dmg
          - os: windows-latest
            cmd: npm run package:win
            artifact_glob: "release-build/*-win-setup.exe"
            release_name: Taplo-win.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: ${{ matrix.cmd }}

      - name: Stage stable release filename
        shell: bash
        run: |
          shopt -s nullglob
          files=(${GITHUB_WORKSPACE}/${{ matrix.artifact_glob }})
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer found for ${{ matrix.release_name }}"
            exit 1
          fi
          cp "${files[0]}" "${GITHUB_WORKSPACE}/${{ matrix.release_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: ${{ matrix.release_name }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/Taplo-mac.dmg
            installers/Taplo-win.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
